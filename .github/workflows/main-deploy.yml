name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: self-hosted

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t app-gha:latest .

      - name: Stop Existing Container
        run: |
          docker rm -f app-gha || true

      - name: Start Container
        run: |
          docker run -d \
            --name node-demo \
            -p 3000:3000 \
            app-gha:latest
